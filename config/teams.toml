# Mapeo de nombres de equipos entre fuentes (ADR-005).
#
# Cada clave de tabla es el team_id canónico (slug legible, usado en la BD).
# - name:          nombre para mostrar
# - football_data: nombre exacto en los CSV de football-data.co.uk
# - understat:     campo "title" en el JSON de understat.com
# - clubelo:       componente de URL en api.clubelo.com/<Club> (sin espacios)
#
# Si una fuente usa un nombre no registrado aquí, la ingesta falla ruidosamente
# indicando el nombre desconocido y este archivo como lugar donde corregirlo.
# Cobertura: los 28 clubes que han jugado LaLiga entre 2018-19 y 2025-26.

