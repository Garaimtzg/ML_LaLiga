# Configuración central del proyecto (CLAUDE.md §8: nada hardcodeado en código).
# Las API keys van en .env, nunca aquí.

[project]
focus_team = "alaves"          # team_id canónico (ver config/teams.toml)
current_season = "2026-27"

[league]
# LaLiga: 20 equipos -> 38 jornadas -> 380 partidos por temporada.
# Parametrizado para que los tests puedan usar mini-ligas sintéticas.
teams_per_season = 20

[seasons]
# Temporadas históricas de entrenamiento (SPEC §5): desde 2018-19 porque no hay
# xG fiable antes; revisable por ADR.
historical = [
    "2018-19",
    "2019-20",
    "2020-21",
    "2021-22",
    "2022-23",
    "2023-24",
    "2024-25",
    "2025-26",
]

[data]
db_path = "data/alaves.db"
raw_dir = "data/raw"           # cache local de descargas (ADR-004)
features_dir = "data/features" # snapshots Parquet del feature store (F2)

[features]
# Versión del conjunto de features (se registra en features.feature_set_version)
feature_set_version = "v1"
# Ventanas móviles de forma (nº de partidos anteriores)
form_windows = [5, 10]
# Temporadas jugadas (total o mayoritariamente) sin público -> flag no_crowd (SPEC §5)
no_crowd_seasons = ["2020-21"]
# Pares de derbi (ids canónicos); parametrizado, no hardcodeado (CLAUDE.md §8)
derbies = [
    ["alaves", "athletic-club"],
    ["alaves", "real-sociedad"],
    ["alaves", "osasuna"],
    ["athletic-club", "real-sociedad"],
    ["athletic-club", "osasuna"],
    ["real-sociedad", "osasuna"],
    ["real-madrid", "atletico-madrid"],
    ["barcelona", "espanyol"],
    ["sevilla", "betis"],
    ["valencia", "levante"],
    ["valencia", "villarreal"],
    ["celta-vigo", "deportivo-la-coruna"],
]

[features.elo_internal]
# Elo propio recalculable (ADR-013): fórmula estándar E = 1/(1+10^(-d/400)).
# K y ventaja de campo son ajustables por validación en F3.
k = 20.0
home_advantage = 60.0   # en puntos Elo, sumados al local en el esperado
initial_rating = 1500.0

[models]
# Directorio de artefactos entrenados (gitignored; el registro con métricas
# y config vive en la tabla model_registry de la BD).
registry_dir = "models/registry"
# Regla anti-sorpresa (SPEC §6.4): si el log-loss de validación de una nueva
# versión empeora más de este porcentaje respecto a la última promocionada,
# se alerta y NO se promociona automáticamente.
max_logloss_regression = 0.10

[models.dixon_coles]
# Ponderación temporal exponencial (SPEC §6.2): peso = exp(-xi * días de
# antigüedad). xi=0.0019/día => un partido de hace un año pesa ~0.5.
# Se usa como valor por defecto; si xi_grid tiene varios valores, el xi
# definitivo se elige por log-loss en validación walk-forward (ADR-019).
xi = 0.0019
xi_grid = [0.0005, 0.001, 0.0019, 0.0035]
# Truncamiento de la matriz de marcadores (P(>10 goles por equipo) ~ 0).
max_goals = 10
# Cota de |rho| (corrección de marcadores bajos): mantiene tau > 0.
rho_bound = 0.2

[models.lightgbm]
# Hiperparámetros v1: valores conservadores documentados (ADR-016), sin búsqueda
# automática todavía (optuna es opcional en SPEC §6.3). Pensados para ~3.000
# filas: árboles poco profundos y aprendizaje lento contra el overfitting.
n_estimators = 300
learning_rate = 0.03
num_leaves = 15
min_child_samples = 50
feature_fraction = 0.7
bagging_fraction = 0.8
bagging_freq = 1
lambda_l2 = 1.0

[models.ensemble]
# Peso del Dixon-Coles en la media ponderada, buscado en rejilla [0,1] por
# log-loss sobre la validación temporal (SPEC §6.3).
weight_grid_step = 0.05

[sources.football_data]
# Columna vertebral: resultados, estadísticas básicas y cuotas (SPEC §3.1).
base_url = "https://www.football-data.co.uk/mmz4281"
division = "SP1"               # Primera División española
rate_limit_seconds = 1.0

[sources.fbref]
# xG por partido y jornada oficial, de la página Scores & Fixtures (ADR-008).
# Rate limit conservador: FBref pide moderación a los bots.
base_url = "https://fbref.com/en/comps"
competition_id = 12
competition_slug = "La-Liga"
rate_limit_seconds = 6.0

[sources.understat]
# Fuente de RELLENO de xG vía su API interna getLeagueData (ADR-011): cubre
# los partidos donde FBref no aporta xG (su versión 2026 lo quitó de las
# páginas de calendario) y será la fuente en vivo de la F7.
base_url = "https://understat.com"
league = "La liga"
rate_limit_seconds = 3.0

[sources.clubelo]
# API CSV pública: http://api.clubelo.com/<Club> devuelve el histórico completo.
base_url = "http://api.clubelo.com"
rate_limit_seconds = 2.0
# Solo se guardan ratings desde esta fecha (un mes antes de la primera temporada).
history_start = "2018-07-01"
